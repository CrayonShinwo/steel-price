    --blue: #5b9fd4; --teal: #4db8a8; --amber: #d4a030; --purple: #9b6fd4;
    --slate: #8899aa; --green: #5a9a72; --red: #d45858; --indigo: #6b80c0;

* { box-sizing:border-box; margin:0; padding:0 }
body {

.header-inner { max-width:800px; margin:0 auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap }
.header h1 { font-size:var(--font-xl); font-weight:700; white-space:nowrap }
.header .sub { font-size:var(--font-sm); color:var(--text3) }
.header-right { margin-left:auto; display:flex; gap:8px; align-items:center }
.btn {

  cursor:pointer; transition:.15s; white-space:nowrap; display:inline-flex; align-items:center; gap:4px;
}
.btn-sm { padding:5px 10px; font-size:11px }
.btn-primary { background:var(--accent); color:#fff }
.btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--text2) }
.btn-danger { background:var(--danger); color:#fff }
.btn-success { background:var(--green); color:#fff }
.btn:hover { opacity:.85 }

/* Admin bar */
.admin-bar { display:none; background:var(--surface2); border-bottom:1px solid var(--border); padding:8px 16px }
.admin-bar.on { display:block }
.admin-inner { max-width:800px; margin:0 auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap }
.admin-badge { font-size:11px; background:var(--danger); color:#fff; padding:3px 8px; border-radius:4px; font-weight:700 }

/* Search */
.search-wrap { max-width:800px; margin:0 auto; padding:10px 16px 0 }
.search-box {
  width:100%; padding:10px 14px; font-size:var(--font-base); border:1.5px solid var(--border);
  border-radius:var(--radius); background:var(--surface); color:var(--text); outline:none; transition:border-color .2s;
}
.search-box:focus { border-color:var(--accent) }

/* Tabs */
.tabs { max-width:800px; margin:0 auto; padding:8px 16px 0; display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch }
.tab { padding:8px 16px; font-size:var(--font-sm); font-weight:600; border:none; border-radius:8px; cursor:pointer; background:var(--surface2); color:var(--text2); white-space:nowrap; transition:all .2s; border:1px solid transparent }
.tab.active { background:var(--accent); color:#fff }

/* Stats */
.stats { max-width:800px; margin:0 auto; padding:8px 16px 0; display:flex; gap:8px; flex-wrap:wrap }
.stat { flex:1; min-width:70px; padding:8px 10px; border-radius:var(--radius); background:var(--surface); border:1px solid var(--border); text-align:center }
.stat .n { font-size:var(--font-xl); font-weight:700; color:var(--accent); line-height:1.2 }
.stat .l { font-size:11px; color:var(--text3) }

/* Content */
.content { max-width:800px; margin:0 auto; padding:8px 16px 40px }
.sheet { display:none }
.sheet.active { display:block }

/* Category */
.cat { background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); margin-bottom:10px; box-shadow:var(--shadow); overflow:hidden }
.cat-head { display:flex; align-items:center; gap:8px; padding:11px 12px; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; transition:background .15s }
.cat-head:hover { background:var(--surface2) }
.cat-head.on { border-bottom:1px solid var(--border) }
.cat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0 }
.cat-name { font-size:var(--font-lg); font-weight:600; flex:1 }
.cat-count { font-size:12px; color:var(--text3); background:var(--surface2); padding:2px 8px; border-radius:10px }
.cat-arrow { font-size:12px; color:var(--text3); transition:.2s }
.cat-head.on .cat-arrow { transform:rotate(180deg) }
.cat-body { display:none }
.cat-body.on { display:block }

/* Table */
.tbl { width:100%; border-collapse:collapse }
.tbl th { font-size:var(--font-sm); color:var(--text3); font-weight:500; text-align:left; padding:7px 10px; border-bottom:2px solid var(--border); background:var(--surface2); white-space:nowrap }
.tbl td { padding:8px 10px; border-bottom:1px solid var(--border); font-size:var(--font-base); vertical-align:middle }
.tbl tr:last-child td { border-bottom:none }
.tbl .mat { font-weight:600; min-width:100px }
.tbl .spec { color:var(--text2); font-size:13px }
.tbl .price { font-weight:700; white-space:nowrap; text-align:right }
.tbl .price.high { color:var(--red) }
.tbl .price.mid { color:var(--amber) }
.tbl .price.low { color:var(--green) }
.tbl .fee { text-align:right; white-space:nowrap; color:var(--text2); font-size:13px }
.tbl .act { text-align:right; white-space:nowrap }
.tbl .act button { margin-left:2px }

/* Badge */
.badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; font-weight:600 }
.badge-carbon { background:#e3edf7; color:var(--blue) }
.badge-quality { background:#daf0ec; color:var(--teal) }
.badge-alloy { background:#fef0dc; color:var(--amber) }
.badge-stainless { background:#edf0f3; color:var(--slate) }
.badge-spring { background:#efe4f8; color:var(--purple) }
.badge-hsla { background:#ddf0e4; color:var(--green) }
.badge-tool { background:#fce4e4; color:var(--red) }
.badge-nickel { background:#e4e8f4; color:var(--indigo) }

  .badge-tool { background:#3a1e1e } .badge-nickel { background:#1e2240 }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; justify-content:center; align-items:flex-start; padding:20px; overflow-y:auto }

.modal { background:var(--surface); border-radius:var(--radius); padding:20px 16px; width:100%; max-width:500px; box-shadow:0 8px 30px rgba(0,0,0,.2) }

/* Contact */
.contact { max-width:800px; margin:0 auto; padding:0 16px 20px; text-align:center; font-size:13px; color:var(--text3) }
.contact strong { color:var(--accent) }

/* Toast */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; font-size:14px; z-index:300; opacity:0; transition:opacity .3s; pointer-events:none }
.toast.on { opacity:1 }
@media (prefers-color-scheme: dark) { .toast { background:#555 } }

.no-result { text-align:center; padding:40px; color:var(--text3) }

/* responsive table scroll */
.tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch }

function loadData() {
  const saved = localStorage.getItem('steel_price_data');
  if (saved) { try { return JSON.parse(saved); } catch(e){} }
  return JSON.parse(JSON.stringify(INITIAL_DATA));
}

function badge(type) {
  return `<span class="badge badge-${type}">${TYPE_LABELS[type]||type}</span>`;
}
function priceCls(p) { const n=parseFloat(p); if(isNaN(n)) return ''; if(n>=15) return 'high'; if(n>=8) return 'mid'; return 'low'; }

function renderStats(items) {
  const ps = items.map(i=>parseFloat(i.price)).filter(n=>!isNaN(n));
  if(!ps.length) return '';
  return ['鏉＄洰:'+items.length, '鍒嗙被:'+new Set(items.map(i=>i.cat)).size,
    '鏈€浣?楼'+Math.min(...ps).toFixed(1), '鏈€楂?楼'+Math.max(...ps).toFixed(1),
    '鍧囦环:楼'+(ps.reduce((a,b)=>a+b,0)/ps.length).toFixed(1)
  ].map(s=>'<div class="stat"><div class="n">'+s.split(':')[1]+'</div><div class="l">'+s.split(':')[0]+'</div></div>').join('');
}

function renderSheet(items, key) {
  if(!items.length) return '<div class="no-result">鏈壘鍒板尮閰嶉」</div>';
  const showFee = key !== 'cutFee' && document.getElementById('chkShowFee')?.checked;
  const groups = {};
  items.forEach(i => { if(!groups[i.cat]) groups[i.cat]=[]; groups[i.cat].push(i); });

  let html='';
  for(const [cat, rows] of Object.entries(groups)) {
    const t = rows[0].type;
    html += '<div class="cat"><div class="cat-head on" onclick="this.classList.toggle(\'on\');this.nextElementSibling.classList.toggle(\'on\')">';
    html += `<div class="cat-dot" style="background:${dotColor(t)}"></div><span class="cat-name">${cat}</span>`;
    html += `<span class="cat-count">${rows.length}椤?/span><span class="cat-arrow">鈻?/span></div>`;
    html += '<div class="cat-body on"><div class="tbl-wrap"><table class="tbl">';
    html += '<tr><th>鏉愯川鐗屽彿</th><th>瑙勬牸</th><th>鍗曚环 (鍏?KG)</th>';
    if(showFee) html += '<th>鍒囧彛璐?/th>';
    html += '<th>澶囨敞</th>';
    if(adminMode) html += '<th>鎿嶄綔</th>';
    html += '</tr>';

    rows.forEach((r,i) => {
      const idx = items.indexOf(r);
      html += `<tr>
        <td class="mat">${badge(r.type)}${r.mat}</td>
        <td class="spec">${r.spec}</td>
        <td class="price ${priceCls(r.price)}">${r.price==='鈥?||r.price==='寰呭畾'?r.price:'楼'+r.price}</td>
        ${showFee?`<td class="fee">${r.fee}</td>`:''}
        <td class="spec">${r.note}</td>`;
      if(adminMode) html += `<td class="act">
        <button class="btn btn-outline btn-sm" onclick="editItem('${key}',${idx})">鉁忥笍</button>
        <button class="btn btn-danger btn-sm" onclick="deleteItem('${key}',${idx})">馃棏</button></td>`;
      html += '</tr>';
    });
    html += '</table></div></div></div>';
  }
  return html;
}

function dotColor(type) {
  const m={carbon:'--blue',quality:'--teal',alloy:'--amber',stainless:'--slate',spring:'--purple',tool:'--red',hsla:'--green',nickel:'--indigo',other:'--rose'};
  return getComputedStyle(document.documentElement).getPropertyValue(m[type]||m.other).trim();
}

function filter(items, term) {
  if(!term) return items;
  const t=term.toLowerCase();
  return items.filter(i=>Object.values(i).some(v=>String(v).toLowerCase().includes(t)));
}

function doRender() {
  const key = SHEET_KEYS[currentSheet];
  const items = filter(data[key], searchTerm);
  document.getElementById('stats').innerHTML = renderStats(items);

function editItem(key, idx) {
  const item = data[key][idx];
  document.getElementById('modalTitle').textContent = '缂栬緫鏉＄洰';
  document.getElementById('fId').value = idx;
  document.getElementById('fSheet').value = key;
  document.getElementById('fCat').value = item.cat;
  document.getElementById('fMat').value = item.mat;
  document.getElementById('fSpec').value = item.spec;
  document.getElementById('fPrice').value = item.price;
  document.getElementById('fFee').value = item.fee;
  document.getElementById('fNote').value = item.note;
  document.getElementById('fType').value = item.type;
  document.getElementById('modal').classList.add('on');
}

function addNewItem() {
  const key = SHEET_KEYS[currentSheet];
  document.getElementById('modalTitle').textContent = '鏂板鏉＄洰';
  document.getElementById('fId').value = -1;
  document.getElementById('fSheet').value = key;
  ['fCat','fMat','fSpec','fPrice','fFee','fNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fType').value = 'carbon';
  document.getElementById('modal').classList.add('on');
}

function closeModal() { document.getElementById('modal').classList.remove('on'); }

function saveItem(e) {
  e.preventDefault();
  const key = document.getElementById('fSheet').value;
  const idx = parseInt(document.getElementById('fId').value);
  const item = {
    cat: document.getElementById('fCat').value.trim(),
    type: document.getElementById('fType').value,
    mat: document.getElementById('fMat').value.trim(),
    spec: document.getElementById('fSpec').value.trim(),
    price: document.getElementById('fPrice').value.trim()||'鈥?,
    fee: document.getElementById('fFee').value.trim()||'鈥?,
    note: document.getElementById('fNote').value.trim(),
  };
  if(idx >= 0) data[key][idx] = item;
  else data[key].push(item);
  saveData(); closeModal(); doRender();
  toast(idx >= 0 ? '宸叉洿鏂? : '宸叉坊鍔?);
}

function deleteItem(key, idx) {
  if(!confirm('纭畾鍒犻櫎姝ゆ潯鐩紵\n\n' + data[key][idx].mat + ' ' + data[key][idx].spec)) return;
  data[key].splice(idx, 1);
  saveData(); doRender();
  toast('宸插垹闄?);
}

// 鈹€鈹€鈹€ EXPORT / IMPORT / RESET 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
document.getElementById('btnExport').onclick = function() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'steel-price-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); toast('澶囦唤宸蹭笅杞?);
};

function importData(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const d = JSON.parse(ev.target.result);
      if(!d.thick||!d.thin||!d.bar) throw new Error('鏍煎紡涓嶅');
      data = d; saveData(); doRender(); toast('鎭㈠鎴愬姛锛?);
    } catch(ex) { toast('鏂囦欢鏍煎紡閿欒'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

document.getElementById('btnReset').onclick = function() {
  if(!confirm('纭畾鎭㈠涓哄垵濮嬫暟鎹紵鎵€鏈変慨鏀瑰皢涓㈠け锛?)) return;
  data = JSON.parse(JSON.stringify(INITIAL_DATA));
  saveData(); doRender(); toast('宸叉仮澶嶅垵濮嬫暟鎹?);
};

// 鈹€鈹€鈹€ ADMIN TOGGLE 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
document.getElementById('btnAdmin').onclick = function() {
  adminMode = !adminMode;
  this.textContent = adminMode ? '馃敁 閫€鍑虹紪杈? : '馃敀 缂栬緫妯″紡';
  this.style.background = adminMode ? 'var(--danger)' : 'var(--slate)';
  document.getElementById('adminBar').classList.toggle('on', adminMode);
  doRender();
};

// 鈹€鈹€鈹€ SEARCH & TABS 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
document.getElementById('search').addEventListener('input', function(e) {
  searchTerm = e.target.value; doRender();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    currentSheet = parseInt(this.dataset.s);
    doRender();
  });
});

// 鈹€鈹€鈹€ TOAST 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'), 2000);
}

// 鈹€鈹€鈹€ MODAL CLICK OUTSIDE 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
document.getElementById('modal').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});

// Initial
doRender();
document.getElementById('chkShowFee').onchange = doRender;
</script>

function categoryBadge(type) {
  const map = {
    carbon: 'badge-carbon',
    quality: 'badge-quality',
    alloy: 'badge-alloy',
    stainless: 'badge-stainless',
    spring: 'badge-spring',
    tool: 'badge-tool',
    hsla: 'badge-hsla',
    nickel: 'badge-nickel',
    other: 'badge-other',
  };
  const labels = {
    carbon: '碳素',
    quality: '优质碳素',
    alloy: '合金',
    stainless: '不锈钢',
    spring: '弹簧钢',
    tool: '工具钢',
    hsla: '高强钢',
    nickel: '镍钢',
    other: '其他',
  };
  return `<span class="badge ${map[type]||'badge-other'}">${labels[type]||type}</span>`;
}

function priceClass(priceStr) {
  const n = parseFloat(priceStr);
  if (isNaN(n)) return '';
  if (n >= 15) return 'high';
  if (n >= 8) return 'mid';
  return 'low';
}

function formatPrice(p) {
  if (!p || p === '—' || p === '待定') return p;
  return `<span class="price-tag"><span class="symbol">¥</span><span class="value">${p}</span><span class="unit">/kg</span></span>`;
}

function renderStats(items) {
  const prices = items.map(i=>parseFloat(i.price)).filter(n=>!isNaN(n));
  if (!prices.length) return '';
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const avg = (prices.reduce((a,b)=>a+b,0) / prices.length).toFixed(1);
  const cats = new Set(items.map(i=>i.cat)).size;
  return `
    <div class="stat"><div class="stat-num">${items.length}</div><div class="stat-label">条目</div></div>
    <div class="stat"><div class="stat-num">${cats}</div><div class="stat-label">分类</div></div>
    <div class="stat"><div class="stat-num">¥${min}</div><div class="stat-label">最低价/kg</div></div>
    <div class="stat"><div class="stat-num">¥${max}</div><div class="stat-label">最高价/kg</div></div>
    <div class="stat"><div class="stat-num">¥${avg}</div><div class="stat-label">均价/kg</div></div>
  `;
}

function renderSheet(items) {
  if (!items.length) return '<div class="no-results">未找到匹配项</div>';

  // Group by category
  const groups = {};
  items.forEach(item => {
    if (!groups[item.cat]) groups[item.cat] = [];
    groups[item.cat].push(item);
  });

  let html = '';
  for (const [cat, rows] of Object.entries(groups)) {
    const type = rows[0].type;
    html += '<div class="cat-card">';
    html += `<div class="cat-header open" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">`;
    html += `<div class="cat-dot" style="background:${getDotColor(type)}"></div>`;
    html += `<span class="cat-name">${cat}</span>`;
    html += `<span class="cat-count">${rows.length}项</span>`;
    html += `<span class="cat-arrow">▼</span>`;
    html += '</div>';
    html += '<div class="cat-body open">';

    // Sub-header for thin plates with size columns
    rows.forEach(row => {
      const pc = priceClass(row.price);
      html += `<div class="price-row">`;
      html += `<span class="material">${categoryBadge(row.type)}${row.mat}</span>`;
      html += `<span class="spec">${row.spec}</span>`;
      html += `<span class="price ${pc}">${formatPrice(row.price)}</span>`;
      if (row.note) html += `<span class="note">${row.note}</span>`;
      html += '</div>';
    });

    html += '</div></div>';
  }
  return html;
}

function getDotColor(type) {
  const style = getComputedStyle(document.documentElement);
  const map = {
    carbon: style.getPropertyValue('--blue').trim(),
    quality: style.getPropertyValue('--teal').trim(),
    alloy: style.getPropertyValue('--amber').trim(),
    stainless: style.getPropertyValue('--slate').trim(),
    spring: style.getPropertyValue('--purple').trim(),
    tool: style.getPropertyValue('--red').trim(),
    hsla: style.getPropertyValue('--green').trim(),
    nickel: style.getPropertyValue('--indigo').trim(),
    other: style.getPropertyValue('--rose').trim(),
  };
  return map[type] || map.other;
}

function filterItems(items, term) {
  if (!term) return items;
  const t = term.toLowerCase();
  return items.filter(i =>
    i.cat.toLowerCase().includes(t) ||
    i.mat.toLowerCase().includes(t) ||
    i.spec.toLowerCase().includes(t) ||
    i.price.toLowerCase().includes(t) ||
    i.note.toLowerCase().includes(t)
  );
}

function updateDisplay() {
  const items = filterItems(sheets[currentSheet], searchTerm);
  document.getElementById('stats').innerHTML = renderStats(items);
  document.getElementById('content').innerHTML = renderSheet(items);
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentSheet = parseInt(tab.dataset.sheet);
    updateDisplay();
  });
});

// Search
document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  updateDisplay();
});

// Initial render
updateDisplay();
