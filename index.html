<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财晟特殊钢 · 价格表</title>
<style>
:root {
  --bg: #f5f3f0; --card: #ffffff; --card2: #faf9f7; --b: #e5e0d8;
  --t: #2c2420; --t2: #6b5e55; --t3: #9b8c80; --accent: #c84b1c;
  --blue: #2a6496; --teal: #1a7a6d; --amber: #b8780a; --purple: #6b3fa0;
  --slate: #4a5568; --green: #2d6a4f; --red: #a83232; --indigo: #3b4f8c;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
  --r: 10px; --fs: 12px; --fm: 14px; --fl: 17px; --fx: 20px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1816; --card: #242220; --card2: #2a2825; --b: #3a3530;
    --t: #e8e0d8; --t2: #b0a598; --t3: #7a7065; --accent: #e87848;
    --blue: #5b9fd4; --teal: #4db8a8; --amber: #d4a030; --purple: #9b6fd4;
    --slate: #8899aa; --green: #5a9a72; --red: #d45858; --indigo: #6b80c0;
  }
}
* { box-sizing:border-box; margin:0; padding:0 }
body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg); color:var(--t); font-size:var(--fm); line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

.header { background:var(--card); border-bottom:1px solid var(--b); padding:11px 16px; position:sticky; top:0; z-index:100; box-shadow:var(--shadow) }
.hdr-inner { max-width:780px; margin:0 auto; display:flex; align-items:center; gap:10px }
.hdr-inner h1 { font-size:var(--fx); font-weight:700; white-space:nowrap; letter-spacing:-0.3px }
.hdr-inner .sub { font-size:var(--fs); color:var(--t3) }
.hdr-actions { margin-left:auto; display:flex; gap:4px }

.btn { padding:6px 11px; font-size:var(--fs); font-weight:600; border:none; border-radius:7px; cursor:pointer; transition:.15s; white-space:nowrap; display:inline-flex; align-items:center; gap:3px; font-family:inherit }
.btn-o { background:transparent; border:1.5px solid var(--b); color:var(--t2) }
.btn-p { background:var(--accent); color:#fff }
.btn-d { background:var(--red); color:#fff }
.btn-s { background:var(--green); color:#fff }
.btn-n { background:var(--slate); color:#fff }
.btn-xs { padding:5px 9px; font-size:11px; border-radius:6px }
.btn:hover { opacity:.85 }

.admin-bar { display:none; background:var(--card2); border-bottom:1px solid var(--b); padding:7px 16px }
.admin-bar.on { display:block }
.admin-inner { max-width:780px; margin:0 auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap }
.admin-tag { font-size:10px; background:var(--red); color:#fff; padding:3px 8px; border-radius:4px; font-weight:700 }

.search-row { max-width:780px; margin:0 auto; padding:10px 16px 0 }
.search-inp { width:100%; padding:10px 14px; font-size:var(--fm); border:1.5px solid var(--b); border-radius:var(--r); background:var(--card); color:var(--t); outline:none; font-family:inherit }
.search-inp:focus { border-color:var(--accent) }

.tabs { max-width:780px; margin:0 auto; padding:8px 16px 0; display:flex; gap:6px; overflow-x:auto }
.tab { padding:8px 15px; font-size:var(--fs); font-weight:600; border:none; border-radius:8px; cursor:pointer; background:var(--card2); color:var(--t2); white-space:nowrap; font-family:inherit }
.tab.active { background:var(--accent); color:#fff }

.content { max-width:780px; margin:0 auto; padding:8px 16px 40px }

/* Category */
.sec { background:var(--card); border-radius:var(--r); border:1px solid var(--b); margin-bottom:10px; overflow:hidden; box-shadow:var(--shadow) }
.sec-head { display:flex; align-items:center; gap:8px; padding:11px 12px; cursor:pointer; user-select:none; transition:background .15s }
.sec-head:hover { background:var(--card2) }
.sec-head.on { border-bottom:1px solid var(--b) }
.sec-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0 }
.sec-name { font-size:var(--fl); font-weight:600; flex:1 }
.sec-n { font-size:12px; color:var(--t3); background:var(--card2); padding:2px 8px; border-radius:10px }
.sec-arr { font-size:10px; color:var(--t3); transition:.2s }
.sec-head.on .sec-arr { transform:rotate(180deg) }
.sec-body { display:none }
.sec-body.on { display:block }

/* Table */
.tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch }
table { width:100%; border-collapse:collapse; table-layout:fixed; min-width:560px }
th { font-size:var(--fs); color:var(--t3); font-weight:600; text-align:left; padding:7px 8px; border-bottom:2px solid var(--b); background:var(--card2); white-space:nowrap }
td { padding:9px 8px; border-bottom:1px solid var(--b); font-size:var(--fm); vertical-align:middle; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
tr:last-child td { border-bottom:none }
tr:nth-child(even) td { background:var(--card2) }

.col-mat { width:160px }
.col-spec { width:155px }
.col-price { width:75px; text-align:right }
.col-fee { width:70px; text-align:center }
.col-note { width:100px; text-align:right }
.col-act { width:60px; text-align:center }

td.mat { font-weight:600 }
td.spec { color:var(--t2); font-size:var(--fs) }
td.price { font-weight:700; text-align:right }
td.price.hi { color:var(--red) }
td.price.mi { color:var(--amber) }
td.price.lo { color:var(--green) }
td.fee { text-align:center; color:var(--t2); font-size:var(--fs) }
td.note { text-align:right; color:var(--t3); font-size:var(--fs) }
td.act { text-align:center }

/* 垂直分割线 */
th { border-right:1px solid var(--b) }
th:last-child { border-right:none }
td { border-right:1px solid var(--b) }
td:last-child { border-right:none }

/* Badge */
.badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; font-weight:600; margin-right:3px }
.b-cb { background:#e3edf7; color:var(--blue) }
.b-cq { background:#daf0ec; color:var(--teal) }
.b-ca { background:#fef0dc; color:var(--amber) }
.b-cs { background:#edf0f3; color:var(--slate) }
.b-cp { background:#efe4f8; color:var(--purple) }
.b-ct { background:#fce4e4; color:var(--red) }
.b-ch { background:#ddf0e4; color:var(--green) }
.b-cn { background:#e4e8f4; color:var(--indigo) }
@media (prefers-color-scheme:dark) {
  .b-cb{background:#1e3044} .b-cq{background:#1a3832} .b-ca{background:#3a2c14}
  .b-cs{background:#252a30} .b-cp{background:#2a1e3a} .b-ct{background:#3a1e1e}
  .b-ch{background:#1a3022} .b-cn{background:#1e2240}
}

/* Modal */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; justify-content:center; align-items:flex-start; padding:20px; overflow-y:auto }
.modal-bg.on { display:flex }
.modal { background:var(--card); border-radius:var(--r); padding:20px 16px; width:100%; max-width:460px; box-shadow:0 12px 40px rgba(0,0,0,.15) }
.modal h3 { font-size:var(--fl); margin-bottom:12px }
.modal label { display:block; font-size:var(--fs); font-weight:600; color:var(--t2); margin:8px 0 3px }
.modal input, .modal select { width:100%; padding:9px 10px; font-size:var(--fm); border:1.5px solid var(--b); border-radius:8px; background:var(--card); color:var(--t); outline:none; font-family:inherit }
.modal input:focus, .modal select:focus { border-color:var(--accent) }
.modal-btns { display:flex; gap:8px; margin-top:16px; justify-content:flex-end }

/* Footer */
.footer { max-width:780px; margin:0 auto; padding:8px 16px 20px; text-align:center; font-size:13px; color:var(--t3); line-height:1.6 }
.footer em { color:var(--accent); font-style:normal }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 22px; border-radius:20px; font-size:14px; z-index:300; opacity:0; transition:opacity .2s; pointer-events:none }
.toast.on { opacity:1 }
@media (prefers-color-scheme:dark) { .toast{background:#555} }
.no-r { text-align:center; padding:40px; color:var(--t3) }
</style>
</head>

<div class="header">
  <div class="hdr-inner">
    <h1>🔩 财晟特殊钢</h1>
    <span class="sub">2026 同行批发价格表</span>
    <div class="hdr-actions">
      <button class="btn btn-o btn-xs" id="btnExport" title="备份">📥</button>
      <button class="btn btn-o btn-xs" title="恢复" onclick="document.getElementById('ifile').click()">📤</button>
      <input type="file" id="ifile" accept=".json" style="display:none" onchange="imp(event)">
      <button class="btn btn-o btn-xs" id="btnReset" title="重置">🔄</button>
      <button class="btn btn-n btn-xs" id="btnAdmin">🔒 编辑</button>
    </div>
  </div>
</div>

<div class="admin-bar" id="adminBar">
  <div class="admin-inner">
    <span class="admin-tag">✏️ 编辑模式</span>
    <span style="font-size:12px;color:var(--t2)">可添加 / 修改 / 删除</span>
    <button class="btn btn-s btn-xs" onclick="addItem()">＋ 新增</button>
    <label style="font-size:12px;color:var(--t3);margin-left:auto;cursor:pointer;display:flex;align-items:center;gap:3px">
      <input type="checkbox" id="chkFee" checked onchange="render()"> 显示切口费
    </label>
  </div>
</div>

<div class="search-row">
  <input class="search-inp" placeholder="🔍 搜索材质 / 牌号 / 规格…" id="search" autocomplete="off">
</div>

<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>
<div class="footer" id="footer"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">新增条目</h3>
    <form onsubmit="saveItem(event)">
      <input type="hidden" id="fId"><input type="hidden" id="fKey">
      <label>类别</label><input id="fCat" required placeholder="如：碳素结构钢">
      <label>材质牌号</label><input id="fMat" required placeholder="如：Q235 / A3 轧制板">
      <label>规格</label><input id="fSpec" required placeholder="如：10 / 12 / 14mm">
      <label>单价 (元/KG)</label><input id="fPrice" placeholder="如：5.5">
      <label>切口费</label><input id="fFee" placeholder="如：0.3/件">
      <label>备注</label><input id="fNote" placeholder="如：整板">
      <label>钢种标签</label>
      <select id="fType">
        <option value="carbon">碳素钢</option><option value="quality">优质碳素</option><option value="alloy">合金钢</option><option value="stainless">不锈钢</option><option value="spring">弹簧钢</option><option value="tool">工具钢</option><option value="hsla">高强钢</option><option value="nickel">镍钢</option><option value="other">其他</option>
      </select>
      <div class="modal-btns">
        <button type="button" class="btn btn-o" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-p">保存</button>
      </div>
    </form>
  </div>
</div>
<div class="toast" id="toast"></div>

const KEYS=['thick','thin','bar','cutFee'], TABS=['中厚板','薄板','圆棒','切口费标准'];

let data=JSON.parse(JSON.stringify(INIT));
try{ const v=localStorage.getItem('sp'); if(v) data=JSON.parse(v); }catch(e){}
function save(){ localStorage.setItem('sp',JSON.stringify(data)); }

let cur=0, q='', admin=false;

function badge(t){ const m={carbon:'cb',quality:'cq',alloy:'ca',stainless:'cs',spring:'cp',tool:'ct',hsla:'ch',nickel:'cn',other:'cb'}; return m[t]||'cb'; }
function pcls(p){ const n=parseFloat(p); if(isNaN(n)) return ''; return n>=15?'hi':n>=8?'mi':'lo'; }
function fmtp(p){ return p==='—'||p==='待定'?p:'¥'+p; }

function dotc(t){ const m={carbon:'--blue',quality:'--teal',alloy:'--amber',stainless:'--slate',spring:'--purple',tool:'--red',hsla:'--green',nickel:'--indigo',other:'--accent'}; return getComputedStyle(document.documentElement).getPropertyValue(m[t]||m.other).trim().replace(/^#/,''); }

function render(){
  const key=KEYS[cur]; let items=data[key];
  if(q){ const t=q.toLowerCase(); items=items.filter(i=>Object.values(i).some(v=>String(v).toLowerCase().includes(t))); }
  const showFee=key!=='cutFee'&&document.getElementById('chkFee')?.checked;

  document.getElementById('tabs').innerHTML=TABS.map((t,i)=>'<button class="tab'+(i===cur?' active':'')+'" data-i="'+i+'">'+t+'</button>').join('');

  if(!items.length){ document.getElementById('content').innerHTML='<div class="no-r">未找到匹配项</div>'; return; }

  const grp={}; items.forEach(i=>{ if(!grp[i.cat]) grp[i.cat]=[]; grp[i.cat].push(i); });
  let h='';
  for(const [cat,rows] of Object.entries(grp)){
    const t=rows[0].type;
    h+='<div class="sec"><div class="sec-head on" onclick="this.classList.toggle(\'on\');this.nextElementSibling.classList.toggle(\'on\')">';
    h+='<div class="sec-dot" style="background:#'+dotc(t)+'"></div><span class="sec-name">'+cat+'</span>';
    h+='<span class="sec-n">'+rows.length+'项</span><span class="sec-arr">▼</span></div>';
    h+='<div class="sec-body on"><div class="tbl-wrap"><table>';
    h+='<colgroup><col class="col-mat"><col class="col-spec"><col class="col-price">';
    if(showFee) h+='<col class="col-fee">';
    h+='<col class="col-note">';
    if(admin) h+='<col class="col-act">';
    h+='</colgroup>';
    h+='<thead><tr><th>材质 / 牌号</th><th>规格</th><th style="text-align:right">单价</th>';
    if(showFee) h+='<th style="text-align:center">切口费</th>';
    h+='<th style="text-align:right">备注</th>';
    if(admin) h+='<th>操作</th>';
    h+='</tr></thead><tbody>';

    rows.forEach(r=>{
      const idx=data[key].indexOf(r);
      h+='<tr>';
      h+='<td class="mat"><span class="badge b-'+badge(r.type)+'">'+TL[r.type]+'</span>'+r.mat+'</td>';
      h+='<td class="spec">'+r.spec+'</td>';
      h+='<td class="price '+pcls(r.price)+'">'+fmtp(r.price)+'</td>';
      if(showFee) h+='<td class="fee">'+r.fee+'</td>';
      h+='<td class="note">'+r.note+'</td>';
      if(admin) h+='<td><button class="btn btn-o btn-xs" onclick="editItem(\''+key+'\','+idx+')">✎</button> <button class="btn btn-d btn-xs" onclick="delItem(\''+key+'\','+idx+')">✕</button></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div></div></div>';
  }
  document.getElementById('content').innerHTML=h;
  document.getElementById('footer').innerHTML='';
}

/* CRUD */
function editItem(k,i){ const it=data[k][i]; document.getElementById('modalTitle').textContent='编辑条目'; document.getElementById('fId').value=i; document.getElementById('fKey').value=k; document.getElementById('fCat').value=it.cat; document.getElementById('fMat').value=it.mat; document.getElementById('fSpec').value=it.spec; document.getElementById('fPrice').value=it.price; document.getElementById('fFee').value=it.fee; document.getElementById('fNote').value=it.note; document.getElementById('fType').value=it.type; document.getElementById('modalBg').classList.add('on'); }
function addItem(){ const k=KEYS[cur]; document.getElementById('modalTitle').textContent='新增条目'; document.getElementById('fId').value=-1; document.getElementById('fKey').value=k; ['fCat','fMat','fSpec','fPrice','fFee','fNote'].forEach(id=>document.getElementById(id).value=''); document.getElementById('fType').value='carbon'; document.getElementById('modalBg').classList.add('on'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('on'); }
function saveItem(e){ e.preventDefault(); const k=document.getElementById('fKey').value; const i=parseInt(document.getElementById('fId').value); const it={cat:document.getElementById('fCat').value.trim(),type:document.getElementById('fType').value,mat:document.getElementById('fMat').value.trim(),spec:document.getElementById('fSpec').value.trim(),price:document.getElementById('fPrice').value.trim()||'—',fee:document.getElementById('fFee').value.trim()||'—',note:document.getElementById('fNote').value.trim()}; if(i>=0) data[k][i]=it; else data[k].push(it); save(); closeModal(); render(); toast(i>=0?'已更新':'已添加'); }
function delItem(k,i){ if(!confirm('确定删除？\n\n'+data[k][i].mat+' '+data[k][i].spec)) return; data[k].splice(i,1); save(); render(); toast('已删除'); }

/* Export/Import/Reset */
document.getElementById('btnExport').onclick=()=>{ const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='steel-price-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); toast('已备份'); };
function imp(e){ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(!d.thick||!d.thin||!d.bar) throw 0; data=d; save(); render(); toast('已恢复'); }catch(x){ toast('格式错误'); } }; r.readAsText(f); e.target.value=''; }
document.getElementById('btnReset').onclick=()=>{ if(!confirm('恢复为初始数据？所有修改将丢失！')) return; data=JSON.parse(JSON.stringify(INIT)); save(); render(); toast('已重置'); };

/* Admin toggle */
document.getElementById('btnAdmin').onclick=function(){ admin=!admin; this.textContent=admin?'🔓 退出':'🔒 编辑'; this.className='btn '+(admin?'btn-d':'btn-n')+' btn-xs'; document.getElementById('adminBar').classList.toggle('on',admin); render(); };

/* Evts */
document.getElementById('search').addEventListener('input',e=>{ q=e.target.value; render(); });
document.getElementById('tabs').addEventListener('click',e=>{ const b=e.target.closest('.tab'); if(!b) return; cur=parseInt(b.dataset.i); render(); });
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target===document.getElementById('modalBg')) closeModal(); });
document.getElementById('chkFee').onchange=render;

function toast(m){ const e=document.getElementById('toast'); e.textContent=m; e.classList.add('on'); setTimeout(()=>e.classList.remove('on'),1800); }

render();
</script>
