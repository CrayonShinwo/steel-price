<html lang="zh-CN">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财晟特殊钢 · 价格表</title>
<style>
:root {
  --bg: #f0ede8; --card: #ffffff; --card2: #faf9f6; --border: #e8e4dc;
  --text: #1e1b18; --t2: #6b635a; --t3: #9b9288;
  --accent: #d45d2c; --accent2: #fef6f0;
  --blue: #1e5a8a; --teal: #0f6b5e; --amber: #9a6508;
  --purple: #5e2d8e; --slate: #3d4a5c; --green: #1d5c3a;
  --red: #9b2e2e; --indigo: #2f3f7a;
  --shadow: 0 2px 8px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.04);
  --radius: 12px;
  --font-xs: 11px; --font-sm: 13px; --font-md: 15px; --font-lg: 18px; --font-xl: 22px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #171512; --card: #1f1d1a; --card2: #252320; --border: #302d28;
    --text: #e8e0d5; --t2: #a0988a; --t3: #70685e;
    --accent: #f07848; --accent2: #2a1f18;
    --blue: #5098cc; --teal: #3da898; --amber: #cc9028;
    --purple: #8e5dc8; --slate: #7a8a9a; --green: #4a8a62;
    --red: #cc4848; --indigo: #5a70b0;
    --shadow: 0 2px 8px rgba(0,0,0,.2);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); font-size: var(--font-md); line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── top bar ── */
.topbar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 10px 14px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
}
.topbar-inner { max-width: 720px; margin: 0 auto; display: flex; align-items: center; gap: 10px; }
.topbar-title { font-size: var(--font-lg); font-weight: 700; letter-spacing: -0.2px; white-space: nowrap; }
.topbar-sub { font-size: var(--font-xs); color: var(--t3); display: none; }
@media (min-width:420px) { .topbar-sub { display: inline; } }
.topbar-actions { margin-left: auto; display: flex; gap: 4px; }

.btn {
  padding: 6px 11px; font-size: var(--font-xs); font-weight: 600; border: none;
  border-radius: 8px; cursor: pointer; transition: .15s; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 3px; font-family: inherit;
}
.btn-o { background: transparent; border: 1.5px solid var(--border); color: var(--t2); }
.btn-p { background: var(--accent); color: #fff; }
.btn-d { background: var(--red); color: #fff; }
.btn-s { background: var(--green); color: #fff; }
.btn-n { background: var(--slate); color: #fff; }
.btn-xs { padding: 4px 8px; font-size: 10px; border-radius: 6px; }
.btn:hover { filter: brightness(0.94); }

/* admin bar */
.admin-bar { display: none; background: var(--accent2); border-bottom: 1px solid var(--border); padding: 7px 14px; }
.admin-bar.on { display: block; }
.admin-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.admin-tag { font-size: 10px; background: var(--red); color: #fff; padding: 3px 8px; border-radius: 4px; font-weight: 700; }

/* search */
.search-row { max-width: 720px; margin: 0 auto; padding: 10px 14px 0; }
.search-input {
  width: 100%; padding: 10px 14px; font-size: var(--font-md); border: 1.5px solid var(--border);
  border-radius: var(--radius); background: var(--card); color: var(--text);
  outline: none; transition: .2s; font-family: inherit;
}
.search-input:focus { border-color: var(--accent); }

/* tabs */
.tab-row { max-width: 720px; margin: 0 auto; padding: 8px 14px 0; display: flex; gap: 6px; overflow-x: auto; }
.tab-btn {
  padding: 8px 15px; font-size: var(--font-sm); font-weight: 600; border: none;
  border-radius: 10px; cursor: pointer; background: var(--card2); color: var(--t2);
  white-space: nowrap; transition: .15s; font-family: inherit;
}
.tab-btn.on { background: var(--accent); color: #fff; }

/* stats */
.stat-row { max-width: 720px; margin: 0 auto; padding: 8px 14px 0; display: flex; gap: 6px; }
.stat-item { flex: 1; padding: 9px 6px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); text-align: center; min-width: 0; }
.stat-num { font-size: var(--font-xl); font-weight: 700; color: var(--accent); line-height: 1.2; }
.stat-lbl { font-size: 10px; color: var(--t3); margin-top: 1px; }

/* content */
.main { max-width: 720px; margin: 0 auto; padding: 10px 14px 40px; }

/* category card */
.sec { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); }
.sec-head {
  display: flex; align-items: center; gap: 8px; padding: 12px 14px;
  cursor: pointer; user-select: none; transition: background .15s;
}
.sec-head:hover { background: var(--card2); }
.sec-head.on { border-bottom: 1px solid var(--border); }
.sec-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sec-name { font-size: var(--font-md); font-weight: 600; flex: 1; min-width: 0; }
.sec-badge { font-size: 11px; color: var(--t3); background: var(--card2); padding: 2px 8px; border-radius: 12px; flex-shrink: 0; }
.sec-arr { font-size: 10px; color: var(--t3); transition: .2s; flex-shrink: 0; }
.sec-head.on .sec-arr { transform: rotate(180deg); }
.sec-body { display: none; }
.sec-body.on { display: block; }

/* row */
.row {
  display: flex; align-items: center; padding: 10px 14px;
  border-bottom: 1px solid var(--border); gap: 8px;
}
.row:last-child { border-bottom: none; }
.row:nth-child(even) { background: var(--card2); }

.row-mat { flex: 3; min-width: 0; font-weight: 600; font-size: var(--font-sm); line-height: 1.3; }
.row-spec { flex: 2; min-width: 0; color: var(--t2); font-size: var(--font-xs); text-align: center; }
.row-price { flex: 1.5; min-width: 0; font-weight: 700; font-size: var(--font-md); text-align: right; white-space: nowrap; }
.row-price.hi { color: var(--red); }
.row-price.mi { color: var(--amber); }
.row-price.lo { color: var(--green); }
.row-fee { flex: 1; min-width: 0; color: var(--t2); font-size: var(--font-xs); text-align: center; white-space: nowrap; }
.row-note { flex: 1; min-width: 0; color: var(--t3); font-size: 11px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-act { flex: 0 0 auto; display: flex; gap: 3px; }

/* type badge */
.tag {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 600; margin-right: 4px; vertical-align: middle;
}
.tag-cb { background: #e2ecf5; color: var(--blue); }
.tag-cq { background: #d5efe9; color: var(--teal); }
.tag-ca { background: #fef0dc; color: var(--amber); }
.tag-cs { background: #eaeef2; color: var(--slate); }
.tag-cp { background: #efe4f8; color: var(--purple); }
.tag-ct { background: #fce4e4; color: var(--red); }
.tag-ch { background: #ddf0e4; color: var(--green); }
.tag-cn { background: #e4e8f4; color: var(--indigo); }
.tag-co { background: #f8e4ec; color: #b04560; }
@media (prefers-color-scheme: dark) {
  .tag-cb { background:#1b2d3d; } .tag-cq { background:#15352e; }
  .tag-ca { background:#352710; } .tag-cs { background:#1f252a; }
  .tag-cp { background:#251a35; } .tag-ct { background:#351a1a; }
  .tag-ch { background:#152a1e; } .tag-cn { background:#1a1e35; }
  .tag-co { background:#301a22; }
}

/* modal */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; justify-content:center; align-items:flex-start; padding:20px; overflow-y:auto; }
.modal-bg.on { display:flex; }
.modal-box { background:var(--card); border-radius:var(--radius); padding:20px 16px; width:100%; max-width:460px; box-shadow:0 12px 40px rgba(0,0,0,.15); }
.modal-box h3 { font-size:var(--font-lg); margin-bottom:12px; }
.modal-box label { display:block; font-size:var(--font-sm); font-weight:600; color:var(--t2); margin:8px 0 3px; }
.modal-box input, .modal-box select {
  width:100%; padding:9px 10px; font-size:var(--font-md); border:1.5px solid var(--border);
  border-radius:8px; background:var(--card); color:var(--text); outline:none; font-family:inherit;
}
.modal-box input:focus, .modal-box select:focus { border-color:var(--accent); }
.modal-btns { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }

/* footer */
.footer { max-width:720px; margin:0 auto; padding:0 14px 20px; text-align:center; font-size:var(--font-xs); color:var(--t3); }
.footer em { color: var(--accent); font-style: normal; }

/* toast */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:#333; color:#fff; padding:10px 22px; border-radius:20px;
  font-size:14px; z-index:300; opacity:0; transition:opacity .25s; pointer-events:none;
}
.toast.on { opacity:1; }
@media (prefers-color-scheme: dark) { .toast { background:#555; } }

/* empty */
.empty { text-align:center; padding:40px; color:var(--t3); font-size:var(--font-md); }

/* hdr row */
.hdr-row {
  display: flex; align-items: center; padding: 7px 14px;
  border-bottom: 2px solid var(--border); gap: 8px;
  background: var(--card2); font-size: var(--font-xs); color: var(--t3); font-weight: 600;
}
.hdr-mat { flex: 3; min-width: 0; }
.hdr-spec { flex: 2; min-width: 0; text-align: center; }
.hdr-price { flex: 1.5; min-width: 0; text-align: right; }
.hdr-fee { flex: 1; min-width: 0; text-align: center; }
.hdr-note { flex: 1; min-width: 0; text-align: right; }
</style>
</head>

<div class="topbar">
  <div class="topbar-inner">
    <span class="topbar-title">财晟特殊钢</span>
    <span class="topbar-sub">2026 同行批发</span>
    <div class="topbar-actions">
      <button class="btn btn-o btn-xs" id="btnExport">📥</button>
      <button class="btn btn-o btn-xs" onclick="document.getElementById('importFile').click()">📤</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-o btn-xs" id="btnReset">↺</button>
      <button class="btn btn-n btn-xs" id="btnAdmin">编辑</button>
    </div>
  </div>
</div>

<div class="admin-bar" id="adminBar">
  <div class="admin-inner">
    <span class="admin-tag">编辑中</span>
    <span style="font-size:12px;color:var(--t2)">可添加 / 修改 / 删除条目</span>
    <button class="btn btn-s btn-xs" onclick="addItem()">＋ 新增</button>
    <label style="font-size:12px;color:var(--t3);margin-left:auto;cursor:pointer;display:flex;align-items:center;gap:4px">
      <input type="checkbox" id="chkFee" checked onchange="render()"> 切口费
    </label>
  </div>
</div>

<div class="search-row">
  <input class="search-input" placeholder="搜索材质、牌号、规格…" id="search" autocomplete="off">
</div>

<div class="tab-row" id="tabRow"></div>
<div class="stat-row" id="statRow"></div>
<div class="main" id="main"></div>
<div class="footer" id="footer"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <h3 id="modalTitle">新增条目</h3>
    <form onsubmit="saveItem(event)">
      <input type="hidden" id="fId"><input type="hidden" id="fKey">
      <label>类别</label><input id="fCat" required placeholder="如：碳素结构钢">
      <label>材质 / 牌号</label><input id="fMat" required placeholder="如：Q235 轧制板">
      <label>规格</label><input id="fSpec" required placeholder="如：10 / 12mm">
      <label>单价 (元/KG)</label><input id="fPrice" placeholder="如：5.5">
      <label>切口费</label><input id="fFee" placeholder="如：0.3/件">
      <label>备注</label><input id="fNote" placeholder="如：整板">
      <label>钢种标签</label>
      <select id="fType">
        <option value="carbon">碳素钢</option><option value="quality">优质碳素</option>
        <option value="alloy">合金钢</option><option value="stainless">不锈钢</option>
        <option value="spring">弹簧钢</option><option value="tool">工具钢</option>
        <option value="hsla">高强钢</option><option value="nickel">镍钢</option><option value="other">其他</option>
      </select>
      <div class="modal-btns">
        <button type="button" class="btn btn-o" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-p">保存</button>
      </div>
    </form>
  </div>
</div>
<div class="toast" id="toast"></div>

const KEYS = ['thick','thin','bar','cutFee'];
const TABS = ['中厚板','薄板','圆棒','切口费标准'];

let data = (()=>{ try{ const v=localStorage.getItem('sp'); if(v) return JSON.parse(v); }catch(e){} return JSON.parse(JSON.stringify(INIT)); })();
function save(){ localStorage.setItem('sp',JSON.stringify(data)); }
let cur=0, q='', admin=false;

function tag(t){ return TAG_CLASS[t]||'co'; }
function pcls(p){ const n=parseFloat(p); if(isNaN(n)) return ''; return n>=15?'hi':n>=8?'mi':'lo'; }
function fmtp(p){ return p==='—'||p==='待定'?p:'¥'+p; }

function render(){
  const key=KEYS[cur]; let items=data[key]; if(q){ const t=q.toLowerCase(); items=items.filter(i=>Object.values(i).some(v=>String(v).toLowerCase().includes(t))); }
  const showFee=key!=='cutFee'&&document.getElementById('chkFee')?.checked;

  // stats
  const ps=items.map(i=>parseFloat(i.price)).filter(n=>!isNaN(n));
  let sh='';
  if(ps.length) sh=['条目:'+items.length,'分类:'+new Set(items.map(i=>i.cat)).size,'最低 ¥'+Math.min(...ps).toFixed(1),'最高 ¥'+Math.max(...ps).toFixed(1),'均价 ¥'+(ps.reduce((a,b)=>a+b,0)/ps.length).toFixed(1)].map(s=>{ const p=s.split(' '); return '<div class="stat-item"><div class="stat-num">'+p[1]+'</div><div class="stat-lbl">'+p[0]+'</div></div>'; }).join('');
  document.getElementById('statRow').innerHTML=sh;

  // tabs
  document.getElementById('tabRow').innerHTML=TABS.map((t,i)=>'<button class="tab-btn'+(i===cur?' on':'')+'" data-i="'+i+'">'+t+'</button>').join('');

  if(!items.length){ document.getElementById('main').innerHTML='<div class="empty">未找到匹配项</div>'; return; }

  const grp={}; items.forEach(i=>{ if(!grp[i.cat]) grp[i.cat]=[]; grp[i.cat].push(i); });

  let html='';
  for(const [cat,rows] of Object.entries(grp)){
    const ti=rows[0].type;
    html+='<div class="sec"><div class="sec-head on" onclick="this.classList.toggle(\'on\');this.nextElementSibling.classList.toggle(\'on\')">';
    html+='<div class="sec-dot" style="background:'+dotc(ti)+'"></div><span class="sec-name">'+cat+'</span>';
    html+='<span class="sec-badge">'+rows.length+'项</span><span class="sec-arr">▼</span></div>';
    html+='<div class="sec-body on">';

    // header row
    html+='<div class="hdr-row"><span class="hdr-mat">材质 / 牌号</span><span class="hdr-spec">规格</span><span class="hdr-price">单价</span>';
    if(showFee) html+='<span class="hdr-fee">切口费</span>';
    html+='<span class="hdr-note">备注</span>';
    if(admin) html+='<span style="flex:0 0 auto;width:52px"></span>';
    html+='</div>';

    rows.forEach(r=>{
      const idx=data[key].indexOf(r);
      html+='<div class="row">';
      html+='<span class="row-mat"><span class="tag tag-c'+tag(r.type)+'">'+TYPE_LABEL[r.type]+'</span>'+r.mat+'</span>';
      html+='<span class="row-spec">'+r.spec+'</span>';
      html+='<span class="row-price '+pcls(r.price)+'">'+fmtp(r.price)+'</span>';
      if(showFee) html+='<span class="row-fee">'+r.fee+'</span>';
      html+='<span class="row-note">'+r.note+'</span>';
      if(admin) html+='<span class="row-act"><button class="btn btn-o btn-xs" onclick="editItem(\''+key+'\','+idx+')">✎</button><button class="btn btn-d btn-xs" onclick="delItem(\''+key+'\','+idx+')">✕</button></span>';
      html+='</div>';
    });
    html+='</div></div>';
  }
  document.getElementById('main').innerHTML=html;
  document.getElementById('footer').innerHTML=cur<3
    ? '📞 凌小姐 153-7770-9780 | 李小姐 133-2685-2517 | 投诉咨询 方生 15322822777<br><em>单价不含税 · 含税÷0.9 · 毛料可理算 厚度+3/+5 长宽+5</em>'
    : '切口政策：200Φ以下长度≤50mm / 200Φ以上≤100mm / 300Φ以上全含 / 调货全含';
}

function dotc(t){ const m={carbon:'--blue',quality:'--teal',alloy:'--amber',stainless:'--slate',spring:'--purple',tool:'--red',hsla:'--green',nickel:'--indigo',other:'--accent'}; return getComputedStyle(document.documentElement).getPropertyValue(m[t]||m.other).trim(); }

/* CRUD */
function editItem(k,i){ const it=data[k][i]; document.getElementById('modalTitle').textContent='编辑条目'; document.getElementById('fId').value=i; document.getElementById('fKey').value=k; document.getElementById('fCat').value=it.cat; document.getElementById('fMat').value=it.mat; document.getElementById('fSpec').value=it.spec; document.getElementById('fPrice').value=it.price; document.getElementById('fFee').value=it.fee; document.getElementById('fNote').value=it.note; document.getElementById('fType').value=it.type; document.getElementById('modalBg').classList.add('on'); }
function addItem(){ const k=KEYS[cur]; document.getElementById('modalTitle').textContent='新增条目'; document.getElementById('fId').value=-1; document.getElementById('fKey').value=k; ['fCat','fMat','fSpec','fPrice','fFee','fNote'].forEach(id=>document.getElementById(id).value=''); document.getElementById('fType').value='carbon'; document.getElementById('modalBg').classList.add('on'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('on'); }
function saveItem(e){ e.preventDefault(); const k=document.getElementById('fKey').value; const i=parseInt(document.getElementById('fId').value); const it={cat:document.getElementById('fCat').value.trim(),type:document.getElementById('fType').value,mat:document.getElementById('fMat').value.trim(),spec:document.getElementById('fSpec').value.trim(),price:document.getElementById('fPrice').value.trim()||'—',fee:document.getElementById('fFee').value.trim()||'—',note:document.getElementById('fNote').value.trim()}; if(i>=0) data[k][i]=it; else data[k].push(it); save(); closeModal(); render(); toast(i>=0?'已更新':'已添加'); }
function delItem(k,i){ if(!confirm('确定删除？\n\n'+data[k][i].mat+' '+data[k][i].spec)) return; data[k].splice(i,1); save(); render(); toast('已删除'); }

/* Export/Import/Reset */
document.getElementById('btnExport').onclick=()=>{ const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='steel-price-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); toast('已下载'); };
function importData(e){ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(!d.thick||!d.thin||!d.bar) throw 0; data=d; save(); render(); toast('已恢复'); }catch(x){ toast('格式错误'); } }; r.readAsText(f); e.target.value=''; }
document.getElementById('btnReset').onclick=()=>{ if(!confirm('恢复为初始数据？修改将丢失！')) return; data=JSON.parse(JSON.stringify(INIT)); save(); render(); toast('已重置'); };

/* Admin */
document.getElementById('btnAdmin').onclick=function(){ admin=!admin; this.textContent=admin?'退出':'编辑'; this.className='btn '+(admin?'btn-d':'btn-n')+' btn-xs'; document.getElementById('adminBar').classList.toggle('on',admin); render(); };

/* Search */
document.getElementById('search').addEventListener('input',function(e){ q=e.target.value; render(); });

/* Tabs */
document.getElementById('tabRow').addEventListener('click',function(e){ const b=e.target.closest('.tab-btn'); if(!b) return; cur=parseInt(b.dataset.i); render(); });

/* Modal */
document.getElementById('modalBg').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
document.getElementById('chkFee').onchange=render;

function toast(m){ const e=document.getElementById('toast'); e.textContent=m; e.classList.add('on'); setTimeout(()=>e.classList.remove('on'),1800); }

render();
</script>
