<style>
:root {
  --bg: #f5f3f0;
  --surface: #ffffff;
  --surface2: #faf9f7;
  --border: #e5e0d8;
  --text: #2c2420;
  --text2: #6b5e55;
  --text3: #9b8c80;
  --accent: #c84b1c;
  --blue: #2a6496;
  --teal: #1a7a6d;
  --amber: #b8780a;
  --purple: #6b3fa0;
  --slate: #4a5568;
  --green: #2d6a4f;
  --red: #a83232;
  --indigo: #3b4f8c;
  --rose: #b04560;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --radius: 10px;
  --font-base: 15px;
  --font-lg: 17px;
  --font-xl: 20px;
  --font-2xl: 24px;
  --font-3xl: 32px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1816;
    --surface: #242220;
    --surface2: #2a2825;
    --border: #3a3530;
    --text: #e8e0d8;
    --text2: #b0a598;
    --text3: #7a7065;
    --accent: #e87848;
    --blue: #5b9fd4;
    --teal: #4db8a8;
    --amber: #d4a030;
    --purple: #9b6fd4;
    --slate: #8899aa;
    --green: #5a9a72;
    --red: #d45858;
    --indigo: #6b80c0;
    --rose: #d47088;
  }
}
* { box-sizing:border-box; margin:0; padding:0 }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: var(--font-base);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  position: sticky; top:0; z-index:100;
  box-shadow: var(--shadow);
}
.header-inner {
  max-width: 720px; margin:0 auto;
  display:flex; align-items:center; gap:12px;
}
.header h1 {
  font-size: var(--font-xl);
  font-weight: 700;
  letter-spacing: -0.3px;
  white-space: nowrap;
}
.header .sub { font-size:13px; color:var(--text3); flex:1; text-align:right; }

/* Search */
.search-wrap {
  max-width:720px; margin:0 auto; padding:12px 16px 0;
}
.search-box {
  width:100%; padding:11px 14px; font-size:var(--font-base);
  border:1.5px solid var(--border); border-radius:10px;
  background:var(--surface); color:var(--text);
  outline:none; transition:border-color .2s;
}
.search-box:focus { border-color:var(--accent) }
.search-box::placeholder { color:var(--text3) }

/* Tabs */
.tabs {
  max-width:720px; margin:0 auto; padding:10px 16px 0;
  display:flex; gap:6px; overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.tab {
  padding:8px 16px; font-size:14px; font-weight:600;
  border:none; border-radius:8px; cursor:pointer;
  background:var(--surface2); color:var(--text2);
  white-space:nowrap; transition:all .2s;
  border:1px solid transparent;
}
.tab.active { background:var(--accent); color:#fff; border-color:var(--accent) }
.tab:hover:not(.active) { background:var(--surface); color:var(--text) }

/* Stats Row */
.stats {
  max-width:720px; margin:0 auto; padding:10px 16px 0;
  display:flex; gap:10px; flex-wrap:wrap;
}
.stat {
  flex:1; min-width:80px; padding:10px 12px; border-radius:10px;
  background:var(--surface); border:1px solid var(--border);
  text-align:center;
}
.stat-num { font-size:var(--font-2xl); font-weight:700; color:var(--accent); line-height:1.1 }
.stat-label { font-size:12px; color:var(--text3); margin-top:2px }

/* Content */
.content { max-width:720px; margin:0 auto; padding:10px 16px 40px; }
.sheet { display:none }
.sheet.active { display:block }

/* Category card */
.cat-card {
  background:var(--surface); border-radius:var(--radius);
  border:1px solid var(--border); overflow:hidden;
  margin-bottom:12px; box-shadow:var(--shadow);
}
.cat-header {
  display:flex; align-items:center; gap:10px;
  padding:13px 14px; cursor:pointer;
  user-select:none; -webkit-tap-highlight-color:transparent;
  border-bottom:1px solid transparent;
  transition:background .15s;
}
.cat-header:hover { background:var(--surface2) }
.cat-header.open { border-bottom-color:var(--border) }
.cat-dot {
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
}
.cat-name { font-size:var(--font-lg); font-weight:600; flex:1 }
.cat-count { font-size:13px; color:var(--text3); background:var(--surface2); padding:2px 8px; border-radius:10px }
.cat-arrow { font-size:13px; color:var(--text3); transition:transform .2s }
.cat-header.open .cat-arrow { transform:rotate(180deg) }
.cat-body { display:none; padding:0 }
.cat-body.open { display:block }

/* Price row */
.price-row {
  display:flex; align-items:center; padding:9px 14px;
  border-bottom:1px solid var(--border); gap:10px;
  font-size:var(--font-base);
}
.price-row:last-child { border-bottom:none }
.price-row .material { flex:1; min-width:0; font-weight:500; font-size:14px }
.price-row .spec { color:var(--text2); font-size:14px; white-space:nowrap; min-width:80px; text-align:right }
.price-row .price {
  font-weight:700; font-size:var(--font-base);
  min-width:80px; text-align:right; white-space:nowrap;
}
.price-row .price.high { color:var(--red) }
.price-row .price.mid { color:var(--amber) }
.price-row .price.low { color:var(--green) }
.price-row .note { font-size:11px; color:var(--text3); min-width:40px; text-align:right; white-space:nowrap }

/* Material badge */
.badge {
  display:inline-block; padding:2px 7px; border-radius:5px;
  font-size:12px; font-weight:600; margin-right:6px;
  vertical-align:middle; line-height:1.4;
}
.badge-carbon { background:#e3edf7; color:var(--blue) }
.badge-quality { background:#daf0ec; color:var(--teal) }
.badge-alloy { background:#fef0dc; color:var(--amber) }
.badge-stainless { background:#edf0f3; color:var(--slate) }
.badge-spring { background:#efe4f8; color:var(--purple) }
.badge-tool { background:#fce4e4; color:var(--red) }
.badge-hsla { background:#ddf0e4; color:var(--green) }
.badge-nickel { background:#e4e8f4; color:var(--indigo) }
.badge-other { background:#f8e4ec; color:var(--rose) }

@media (prefers-color-scheme: dark) {
  .badge-carbon { background:#1e3044; color:#5b9fd4 }
  .badge-quality { background:#1a3832; color:#4db8a8 }
  .badge-alloy { background:#3a2c14; color:#d4a030 }
  .badge-stainless { background:#252a30; color:#8899aa }
  .badge-spring { background:#2a1e3a; color:#9b6fd4 }
  .badge-tool { background:#3a1e1e; color:#d45858 }
  .badge-hsla { background:#1a3022; color:#5a9a72 }
  .badge-nickel { background:#1e2240; color:#6b80c0 }
  .badge-other { background:#381e28; color:#d47088 }
}

/* No results */
.no-results {
  text-align:center; padding:40px 16px; color:var(--text3);
  font-size:var(--font-lg);
}

/* Section divider */
.section-title {
  font-size:var(--font-lg); font-weight:700;
  padding:16px 0 8px; margin-top:4px;
  display:flex; align-items:center; gap:8px;
}
.section-title::before {
  content:''; width:4px; height:20px; border-radius:2px;
  background:var(--accent);
}

/* Sub-note */
.subnote {
  font-size:13px; color:var(--text3); padding:4px 14px 8px;
  font-style:italic;
}

/* Contact bar */
.contact-bar {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 16px;
  margin-bottom:12px; font-size:14px; color:var(--text2);
  text-align:center; box-shadow:var(--shadow);
}
.contact-bar strong { color:var(--accent); font-size:var(--font-base) }

/* Price tag */
.price-tag {
  display:inline-flex; align-items:baseline; gap:2px;
  font-weight:700;
}
.price-tag .symbol { font-size:11px; font-weight:500 }
.price-tag .value { font-size:var(--font-base) }
.price-tag .unit { font-size:11px; font-weight:400; color:var(--text3) }
</style>
</head>

// ─── RENDER ────────────────────────────────────────

const sheets = [thickPlates, thinPlates, roundBars];
let currentSheet = 0;
let searchTerm = '';

function categoryBadge(type) {
  const map = {
    carbon: 'badge-carbon',
    quality: 'badge-quality',
    alloy: 'badge-alloy',
    stainless: 'badge-stainless',
    spring: 'badge-spring',
    tool: 'badge-tool',
    hsla: 'badge-hsla',
    nickel: 'badge-nickel',
    other: 'badge-other',
  };
  const labels = {
    carbon: '碳素',
    quality: '优质碳素',
    alloy: '合金',
    stainless: '不锈钢',
    spring: '弹簧钢',
    tool: '工具钢',
    hsla: '高强钢',
    nickel: '镍钢',
    other: '其他',
  };
  return `<span class="badge ${map[type]||'badge-other'}">${labels[type]||type}</span>`;
}

function priceClass(priceStr) {
  const n = parseFloat(priceStr);
  if (isNaN(n)) return '';
  if (n >= 15) return 'high';
  if (n >= 8) return 'mid';
  return 'low';
}

function formatPrice(p) {
  if (!p || p === '—' || p === '待定') return p;
  return `<span class="price-tag"><span class="symbol">¥</span><span class="value">${p}</span><span class="unit">/kg</span></span>`;
}

function renderStats(items) {
  const prices = items.map(i=>parseFloat(i.price)).filter(n=>!isNaN(n));
  if (!prices.length) return '';
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const avg = (prices.reduce((a,b)=>a+b,0) / prices.length).toFixed(1);
  const cats = new Set(items.map(i=>i.cat)).size;
  return `
    <div class="stat"><div class="stat-num">${items.length}</div><div class="stat-label">条目</div></div>
    <div class="stat"><div class="stat-num">${cats}</div><div class="stat-label">分类</div></div>
    <div class="stat"><div class="stat-num">¥${min}</div><div class="stat-label">最低价/kg</div></div>
    <div class="stat"><div class="stat-num">¥${max}</div><div class="stat-label">最高价/kg</div></div>
    <div class="stat"><div class="stat-num">¥${avg}</div><div class="stat-label">均价/kg</div></div>
  `;
}

function renderSheet(items) {
  if (!items.length) return '<div class="no-results">未找到匹配项</div>';

  // Group by category
  const groups = {};
  items.forEach(item => {
    if (!groups[item.cat]) groups[item.cat] = [];
    groups[item.cat].push(item);
  });

  let html = '';
  for (const [cat, rows] of Object.entries(groups)) {
    const type = rows[0].type;
    html += '<div class="cat-card">';
    html += `<div class="cat-header open" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">`;
    html += `<div class="cat-dot" style="background:${getDotColor(type)}"></div>`;
    html += `<span class="cat-name">${cat}</span>`;
    html += `<span class="cat-count">${rows.length}项</span>`;
    html += `<span class="cat-arrow">▼</span>`;
    html += '</div>';
    html += '<div class="cat-body open">';

    // Sub-header for thin plates with size columns
    rows.forEach(row => {
      const pc = priceClass(row.price);
      html += `<div class="price-row">`;
      html += `<span class="material">${categoryBadge(row.type)}${row.mat}</span>`;
      html += `<span class="spec">${row.spec}</span>`;
      html += `<span class="price ${pc}">${formatPrice(row.price)}</span>`;
      if (row.note) html += `<span class="note">${row.note}</span>`;
      html += '</div>';
    });

    html += '</div></div>';
  }
  return html;
}

function getDotColor(type) {
  const style = getComputedStyle(document.documentElement);
  const map = {
    carbon: style.getPropertyValue('--blue').trim(),
    quality: style.getPropertyValue('--teal').trim(),
    alloy: style.getPropertyValue('--amber').trim(),
    stainless: style.getPropertyValue('--slate').trim(),
    spring: style.getPropertyValue('--purple').trim(),
    tool: style.getPropertyValue('--red').trim(),
    hsla: style.getPropertyValue('--green').trim(),
    nickel: style.getPropertyValue('--indigo').trim(),
    other: style.getPropertyValue('--rose').trim(),
  };
  return map[type] || map.other;
}

function filterItems(items, term) {
  if (!term) return items;
  const t = term.toLowerCase();
  return items.filter(i =>
    i.cat.toLowerCase().includes(t) ||
    i.mat.toLowerCase().includes(t) ||
    i.spec.toLowerCase().includes(t) ||
    i.price.toLowerCase().includes(t) ||
    i.note.toLowerCase().includes(t)
  );
}

function updateDisplay() {
  const items = filterItems(sheets[currentSheet], searchTerm);
  document.getElementById('stats').innerHTML = renderStats(items);
  document.getElementById('content').innerHTML = renderSheet(items);
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentSheet = parseInt(tab.dataset.sheet);
    updateDisplay();
  });
});

// Search
document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  updateDisplay();
});

// Initial render
